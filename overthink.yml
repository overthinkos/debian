#  overthinkos/debian — the Debian image family, split out of the main
#  overthink repo (2026-05). Mounted as a git submodule at image/debian.
#
#  SINGLE-FILE config (2026-05 import-namespace cutover): every local entity
#  (the debian base + debootstrap family, the debian-coder kitchen-sink image,
#  the debian bootstrap VM, the disposable eval bed) is inlined here. This repo
#  VENDORS NOTHING — every layer is an `@github.com/...` ref, and the shared
#  build-config (distro/builder/init vocabulary) arrives via `import:`.
#
#  import: is a LIST. Debian roots its bases on the upstream docker.io
#  `debian:13` image directly (no main base-stack dependency), so it needs NO
#  `ov` namespace import — only the flat build.yml vocabulary import (a bare
#  string, merged into this repo's root namespace). The only cross-repo edge is
#  debian → main (layers + build.yml); there is NO main ↔ debian coupling.
#
#  Directly buildable: `ov image build debian` (the build verb defaults to this
#  overthink.yml). From the parent repo: `ov -C image/debian image build
#  debian`, or anywhere: `ov --repo overthinkos/debian image build debian`.
version: 2026.144.1443
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - deb
    merge:
        auto: false
        max_mb: 128
import:
    # Shared build-config vocabulary (distro.debian + the deb format template +
    # the debootstrap builder template) — flat root import, pinned to one tag.
    - '@github.com/overthinkos/overthink/build.yml:v2026.150.1904'
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
eval:
    # Disposable R10 test bed for the debian bootstrap VM (kind:eval — the
    # 2026-05 deploy→eval unification moved repo-shipped disposable beds out of
    # deploy.yml). disposable: true is the sole authorization for the unattended
    # destroy+rebuild driven by `ov eval run eval-debian-debootstrap-vm`.
    eval-debian-debootstrap-vm:
        target: vm
        vm: debian-debootstrap
        disposable: true
        lifecycle: dev
