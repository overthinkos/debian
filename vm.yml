#  Per-kind file for vm entries. Sibling of overthink.yml — included via
#  overthink.yml's `includes:` list. The schema kind discriminator is
#  `kind: vm` for kind-keyed entries; root-shape map is `vm:` (this file).
#  2026-05 kind-files cutover.
version: 2026.155.1801
vm:
    debian-debootstrap:
        #  `source.kind: bootstrap` builds a Debian rootfs from scratch via
        #  debootstrap inside the debian-debootstrap-builder container, then boots
        #  it under libvirt/QEMU. The debootstrap builder template + distro.debian
        #  config resolve from the imported build.yml.
        source:
            kind: bootstrap
            builder: debootstrap
            builder_image: debian-debootstrap-builder
            distro: debian
            package:
                - sudo
                - openssh-server
                - qemu-guest-agent
                - cloud-init
            rootfs: ext4
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: debian
            port: 12227
            key_source: generate
        cloud_init:
            users:
                - name: debian
                  sudo: true
                  shell: /bin/bash
            runcmd:
                - systemctl enable --now ssh
                - systemctl enable --now qemu-guest-agent
                # Diagnostic: write boot state to /boot for post-mortem mount.
                - "{ ip a; echo ===listen===; ss -tlnp; echo ===ssh===; systemctl status ssh --no-pager; } > /boot/ov-diag.txt 2>&1"
